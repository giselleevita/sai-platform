name: Bug report
description: Report a reproducible defect
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Sev 1 (production down/data loss)
        - Sev 2 (major functionality blocked)
        - Sev 3 (degraded behavior/workaround exists)
        - Sev 4 (minor issue)
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Branch, commit SHA, browser/runtime, local/prod

  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Logs, screenshots, request IDs, error traces
