name: Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: quality-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build + Test (Node 20)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_TELEMETRY_DISABLED: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate runtime version
        run: npm run check:node

      - name: Build workspace
        run: npm run build

      - name: Run minimal test suite
        run: npm run test

      - name: Enforce CSRF security coverage gate
        run: npm --workspace @sai/api run test:security

  docker-build:
    name: Docker build (API + Web)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            dockerfile: apps/api/Dockerfile
            image: sai-api
          - name: web
            dockerfile: apps/web/Dockerfile
            image: sai-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -f ${{ matrix.dockerfile }} -t ${{ matrix.image }}:ci .
